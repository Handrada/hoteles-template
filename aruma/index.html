<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARUMA SUITES | Hotel Minimalista & Spa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slow-zoom { from { transform: scale(1); } to { transform: scale(1.15); } }
        .animate-fade-in-up { animation: fade-in-up 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-slow-zoom { animation: slow-zoom 25s ease-in-out infinite alternate; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .nav-scrolled { background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); padding-top: 1rem; padding-bottom: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); color: #1c1917; }
        
        /* Efecto de zoom suave para todas las imágenes */
        .img-container img { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .img-container:hover img { transform: scale(1.07); }
    </style>
</head>
<body class="bg-neutral-50 text-stone-900 overflow-x-hidden">

    <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 py-8 px-6 text-white">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-light tracking-[0.3em] uppercase">
                ARUMA SUITES<span class="font-bold text-stone-500">.</span>
            </div>
            <div class="hidden md:flex items-center space-x-10 text-[10px] uppercase tracking-[0.2em] font-medium">
                <a href="#" class="hover:text-stone-400">Inicio</a>
                <a href="#galeria" class="hover:text-stone-400">Galería</a>
                <a href="#servicios" class="hover:text-stone-400">Servicios</a>
                <a href="#habitaciones" class="hover:text-stone-400">Habitaciones</a>
                <button class="px-6 py-2 border border-white/30 bg-white/10 backdrop-blur-sm hover:bg-white hover:text-stone-900 transition-all">Reservar</button>
            </div>
            <button class="md:hidden" id="menu-toggle"><i data-lucide="menu"></i></button>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-white hidden flex-col items-center justify-center space-y-8 text-xl uppercase tracking-widest">
        <button id="menu-close" class="absolute top-8 right-8"><i data-lucide="x"></i></button>
        <a href="#" class="mobile-link">Inicio</a>
        <a href="#galeria" class="mobile-link">Galería</a>
        <a href="#servicios" class="mobile-link">Servicios</a>
        <a href="#habitaciones" class="mobile-link">Habitaciones</a>
    </div>

    <header class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="img/1.webp" class="w-full h-full object-cover animate-slow-zoom" alt="Hero">
            <div class="absolute inset-0 bg-black/40"></div>
        </div>
        <div class="relative z-10 text-center text-white px-6">
            <span class="text-[10px] uppercase tracking-[0.5em] mb-4 block opacity-80">Bienvenidos a lo esencial</span>
            <h1 class="text-6xl md:text-9xl font-extralight tracking-tighter mb-8 animate-fade-in-up">Pureza <span class="serif-italic font-light">&</span> Calma</h1>
        </div>
    </header>

    <section id="galeria" class="pt-20 pb-10 px-6 bg-white reveal">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 md:grid-rows-3 gap-4 h-auto md:h-[750px]">
            <div class="img-container relative overflow-hidden md:col-span-2 md:row-span-2">
                <img src="img/2.webp" loading="lazy" class="w-full h-full object-cover">
            </div>
            <div class="img-container relative overflow-hidden"><img src="img/3.webp" loading="lazy" class="w-full h-full object-cover"></div>
            <div class="img-container relative overflow-hidden"><img src="img/4.webp" loading="lazy" class="w-full h-full object-cover"></div>
            <div class="img-container relative overflow-hidden"><img src="img/5.webp" loading="lazy" class="w-full h-full object-cover"></div>
            <div class="img-container relative overflow-hidden md:col-span-2"><img src="img/6.webp" loading="lazy" class="w-full h-full object-cover"></div>
        </div>
    </section>

    <section id="servicios" class="py-12 px-6 bg-white reveal">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
            <div class="group">
                <i data-lucide="wifi" stroke-width="1" class="w-6 h-6 mx-auto mb-4 text-stone-400"></i>
                <h3 class="text-xs uppercase tracking-widest font-bold mb-2">Wifi</h3>
                <p class="text-stone-400 text-xs">Alta velocidad.</p>
            </div>
            <div class="group">
                <i data-lucide="waves" stroke-width="1" class="w-6 h-6 mx-auto mb-4 text-stone-400"></i>
                <h3 class="text-xs uppercase tracking-widest font-bold mb-2">Piscina</h3>
                <p class="text-stone-400 text-xs">Infinity pool.</p>
            </div>
            <div class="group">
                <i data-lucide="armchair" stroke-width="1" class="w-6 h-6 mx-auto mb-4 text-stone-400"></i>
                <h3 class="text-xs uppercase tracking-widest font-bold mb-2">Lounge</h3>
                <p class="text-stone-400 text-xs">Áreas de descanso.</p>
            </div>
        </div>
    </section>

    <section id="habitaciones" class="py-10 px-6 bg-white reveal">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="img-container overflow-hidden h-[350px]"><img src="img/7.webp" class="w-full h-full object-cover"></div>
                <div class="img-container overflow-hidden h-[250px]"><img src="img/15.webp" class="w-full h-full object-cover"></div>
                <div class="img-container overflow-hidden h-[250px]"><img src="img/14.webp" class="w-full h-full object-cover"></div>
            </div>
            <div class="space-y-6">
                <div class="img-container overflow-hidden h-[250px]"><img src="img/8.webp" class="w-full h-full object-cover"></div>
                <div class="img-container overflow-hidden h-[350px]"><img src="img/12.webp" class="w-full h-full object-cover"></div>
                <div class="img-container overflow-hidden h-[250px]"><img src="img/13.webp" class="w-full h-full object-cover"></div>
            </div>
            <div class="space-y-6">
                <div class="img-container overflow-hidden h-[350px]"><img src="img/9.webp" class="w-full h-full object-cover"></div>
                <div class="img-container overflow-hidden h-[250px]"><img src="img/10.webp" class="w-full h-full object-cover"></div>
                <div class="img-container overflow-hidden h-[250px]"><img src="img/11.webp" class="w-full h-full object-cover"></div>
            </div>
        </div>
    </section>

    <footer class="py-16 bg-white text-center border-t border-stone-100">
        <div class="text-3xl font-light tracking-[0.3em] uppercase italic mb-4">Aruma<span class="text-stone-400 not-italic">.</span></div>
        <p class="text-[9px] uppercase tracking-widest text-stone-400">© 2026 Aruma Suites Hotel</p>
    </footer>

    <script>
        lucide.createIcons();
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) navbar.classList.add('nav-scrolled');
            else navbar.classList.remove('nav-scrolled');
            document.querySelectorAll('.reveal').forEach(reveal => {
                if (reveal.getBoundingClientRect().top < window.innerHeight - 100) reveal.classList.add('active');
            });
        });
        document.getElementById('menu-toggle').addEventListener('click', () => document.getElementById('mobile-menu').classList.remove('hidden'));
        document.getElementById('menu-close').addEventListener('click', () => document.getElementById('mobile-menu').classList.add('hidden'));
    </script>

    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
        var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
        s1.async=true;
        s1.src='https://embed.tawk.to/69adc930811e1a1c36cff330/1jj7djpt6';
        s1.charset='UTF-8';
        s1.setAttribute('crossorigin','*');
        s0.parentNode.insertBefore(s1,s0);
        })();
    </script>
</body>
</html>
